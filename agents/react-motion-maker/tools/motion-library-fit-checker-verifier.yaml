name: motion-library-fit-checker-verifier
description: Validate whether a motion-library selection result covers the key decision dimensions and remains actionable.
version: 1.0.0

input_schema:
  type: object
  properties:
    input_path:
      type: string
      description: Path to the JSON output generated by motion-library-fit-checker.
  required:
    - input_path

output_schema:
  type: object
  properties:
    valid:
      type: boolean
    errors:
      type: array
      items:
        type: string
    warnings:
      type: array
      items:
        type: string
    summary:
      type: object
      properties:
        selected_approach:
          type: string
        candidate_count:
          type: integer

implementation:
  type: script
  path: motion-library-fit-checker-verifier.py
  runtime: python3
  timeout: 15

annotations:
  requires_confirmation: false
  read_only: true
  cost: low

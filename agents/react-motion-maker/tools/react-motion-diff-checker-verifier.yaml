name: react-motion-diff-checker-verifier
description: Validate whether a motion diff check includes enough implementation-quality signals for delivery decisions.
version: 1.0.0

input_schema:
  type: object
  properties:
    input_path:
      type: string
      description: Path to the JSON output generated by react-motion-diff-checker.
  required:
    - input_path

output_schema:
  type: object
  properties:
    valid:
      type: boolean
    errors:
      type: array
      items:
        type: string
    warnings:
      type: array
      items:
        type: string
    summary:
      type: object
      properties:
        files_checked:
          type: integer
        selected_approach:
          type: string

implementation:
  type: script
  path: react-motion-diff-checker-verifier.py
  runtime: python3
  timeout: 15

annotations:
  requires_confirmation: false
  read_only: true
  cost: low

name: react-project-context-scanner-verifier
description: Validate whether a React project context scan is complete enough to support animation-library selection.
version: 1.0.0

input_schema:
  type: object
  properties:
    input_path:
      type: string
      description: Path to the JSON output generated by react-project-context-scanner.
  required:
    - input_path

output_schema:
  type: object
  properties:
    valid:
      type: boolean
      description: Whether the scan output is actionable.
    errors:
      type: array
      items:
        type: string
    warnings:
      type: array
      items:
        type: string
    summary:
      type: object
      properties:
        framework:
          type: string
        ssr:
          type: boolean
        motion_lib_count:
          type: integer

implementation:
  type: script
  path: react-project-context-scanner-verifier.py
  runtime: python3
  timeout: 15

annotations:
  requires_confirmation: false
  read_only: true
  cost: low
